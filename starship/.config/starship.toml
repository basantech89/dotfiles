format = """
[оӮ¶](color_os)\
$os\
[оӮ°](bg:color_dir fg:color_os)\
$directory\
[оӮ°](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[оӮ° ](fg:color_git)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

right_format = """
[оӮІ](fg:color_aws)\
$aws\
[оӮІ](fg:color_node bg:color_aws)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[оӮІ](fg:color_docker bg:color_node)\
$docker_context\
[оӮІ](fg:color_time bg:color_docker)\
$time\
[оӮҙ](color_time)\
"""

# continuation_prompt = 'в–¶в–¶ '

palette = 'rox'

[palettes.rox]
color_os = '#9A348E'
color_dir = '#DA627D'
color_git = '#FCA17D'
color_time = '#33658A'
color_docker = '#06969A'
color_node = '#86BBD8'
color_aws = '#FF9900'

[aws]
format = '[ $symbol($profile )(\($region\) )]($style)'
style = 'italic bg:color_aws'
symbol = 'пү° '
[aws.region_aliases]
ap-south-1 = 'ap'
us-east-1 = 'ue'
[aws.profile_aliases]
bp-dev = 'dev'

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:color_os"
style_root = "bg:color_os"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:color_os"
disabled = false # Disabled by default

[directory]
style = "bg:color_dir"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " у°Ҳҷп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important у°Ҳҷ " = " у°Ҳҷп„Ә "

[c]
symbol = "оҳһ "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:color_docker"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "оүө "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пҗҳ"
style = "bg:color_git"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color_git"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оҙҚ"
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "у°ҶҘ "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оң· "
style = "bg:color_node"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:color_time"
format = '[ вҷҘ $time ]($style)'

